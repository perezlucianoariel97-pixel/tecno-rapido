baseURL = "https://tecno-rapido.netlify.app/"
languageCode = "es"
lang = "es"
title = "Tecno Rápido"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
hasCJKLanguage = false
enableEmoji = true
copyright = "© 2026 Tecno Rápido"

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  title = "Tecno Rápido"
  description = "Guías, consejos y trucos de tecnología en español. Windows, Android, seguridad y software explicados de forma clara y práctica."
  keywords = ["tecnología", "windows", "android", "seguridad informática", "software gratis", "consejos tech", "optimización PC"]
  author = "Tecno Rápido"
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  ShowFullTextinRSS = true
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true

  [params.homeInfoParams]
    Title = "Haz que tu tecnología trabaje para ti."
    Content = "Guías prácticas, trucos y herramientas de tecnología en español. Sin jerga. Sin relleno. Solo lo que funciona."

  [params.label]
    text = "Tecno Rápido"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    identifier = "inicio"
    name = "Inicio"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "articulos"
    name = "Artículos"
    url = "/posts/"
    weight = 20
  [[menu.main]]
    identifier = "categorias"
    name = "Categorías"
    url = "/categories/"
    weight = 30
  [[menu.main]]
    identifier = "acerca"
    name = "Acerca"
    url = "/acerca/"
    weight = 40

[taxonomies]
  category = "categories"
  tag = "tags"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  anchorLineNos = false
  codeFences = true
  guessSyntax = true
  lineNos = false
  style = "monokai"
